<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .section { display: none; }
    .active { display: block; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex">
  <!-- Sidebar -->
  <aside class="w-64 bg-blue-700 text-white flex flex-col">
    <div class="p-6 text-center border-b border-blue-500">
      <h2 class="text-2xl font-semibold">Admin Panel</h2>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('students')">🎓 Students</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('staff')">👩‍🏫 Staff</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('jobs')">💼 Jobs</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('trainings')">📚 Trainings</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('announcements')">📢 Announcements</button>
    </nav>
    <div class="p-4 border-t border-blue-600">
      <button onclick="logout()" class="w-full bg-red-500 py-2 rounded hover:bg-red-600">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-8 overflow-auto">
    <h1 class="text-3xl font-semibold text-blue-700 mb-6">Admin Dashboard</h1>

    <!-- Students -->
    <section id="students" class="section active">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Students</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white">
            <tr><th class="p-2">Name</th><th>Email</th><th>Department</th><th>Action</th></tr>
          </thead>
          <tbody id="studentsTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Add New Student</h3>
        <form id="addStudentForm" class="flex flex-wrap gap-4">
          <input id="sname" placeholder="Name" class="border p-2 rounded w-60" required>
          <input id="semail" placeholder="Email" class="border p-2 rounded w-60" required>
          <input id="spass" placeholder="Password" type="password" class="border p-2 rounded w-60" required>
          <input id="sdept" placeholder="Department" class="border p-2 rounded w-60">
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Student</button>
        </form>
      </div>
    </section>

    <!-- Staff -->
    <section id="staff" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Staff</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white">
            <tr><th class="p-2">Name</th><th>Email</th><th>Action</th></tr>
          </thead>
          <tbody id="staffTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Add New Staff</h3>
        <form id="addStaffForm" class="flex flex-wrap gap-4">
          <input id="stname" placeholder="Name" class="border p-2 rounded w-60" required>
          <input id="stemail" placeholder="Email" class="border p-2 rounded w-60" required>
          <input id="stpass" placeholder="Password" type="password" class="border p-2 rounded w-60" required>
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Staff</button>
        </form>
      </div>
    </section>

    <!-- Jobs -->
    <section id="jobs" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Jobs</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white">
            <tr><th>Title</th><th>Company</th><th>Description</th><th>Action</th></tr>
          </thead>
          <tbody id="jobsTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Add Job</h3>
        <form id="addJobForm" class="flex flex-wrap gap-4">
          <input id="jtitle" placeholder="Title" class="border p-2 rounded w-60" required>
          <input id="jcompany" placeholder="Company" class="border p-2 rounded w-60" required>
          <textarea id="jdesc" placeholder="Description" class="border p-2 rounded w-full h-20"></textarea>
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Job</button>
        </form>
      </div>
    </section>

    <!-- Trainings -->
    <section id="trainings" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Trainings</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white">
            <tr><th>Title</th><th>Trainer</th><th>Date</th><th>Action</th></tr>
          </thead>
          <tbody id="trainingTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Add Training</h3>
        <form id="addTrainingForm" class="flex flex-wrap gap-4">
          <input id="ttitle" placeholder="Title" class="border p-2 rounded w-60" required>
          <input id="ttrainer" placeholder="Trainer" class="border p-2 rounded w-60" required>
          <input id="tdate" type="date" class="border p-2 rounded w-60" required>
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Training</button>
        </form>
      </div>
    </section>

    <!-- Announcements -->
    <section id="announcements" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Announcements</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white">
            <tr><th>Title</th><th>Message</th><th>Date</th><th>Action</th></tr>
          </thead>
          <tbody id="annTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Post Announcement</h3>
        <form id="addAnnForm" class="flex flex-wrap gap-4">
          <input id="atitle" placeholder="Title" class="border p-2 rounded w-60" required>
          <textarea id="amsg" placeholder="Message" class="border p-2 rounded w-full h-20"></textarea>
          <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Post</button>
        </form>
      </div>
    </section>
  </main>

  <script>
    const base = 'http://localhost:5000/api/admin';

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function logout() {
      localStorage.removeItem('loggedInUser');
      window.location.href = 'login.html';
    }

    // --------- STUDENTS CRUD ---------
    async function loadStudents() {
      const res = await fetch(`${base}/students`);
      const students = await res.json();
      document.getElementById('studentsTable').innerHTML = students.map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${s.email}</td>
          <td>${s.department || '-'}</td>
          <td>
    ${!s.isApproved ? `
      <button class="bg-green-500 text-white px-2 py-1 rounded mr-2"
        onclick="approveStudent('${s._id}')">Approve</button>
    ` : `<span class="text-green-600 font-semibold">Approved</span>`}
    <button class="bg-red-500 text-white px-2 py-1 rounded"
      onclick="deleteStudent('${s._id}')">Delete</button>
  </td>
        </tr>`).join('');
    }

    document.getElementById('addStudentForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const student = {
        name: document.getElementById('sname').value,
        email: document.getElementById('semail').value,
        password: document.getElementById('spass').value,
        department: document.getElementById('sdept').value
      };
      await fetch(`${base}/students`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(student) });
      loadStudents();
      e.target.reset();
    });

    async function approveStudent(id) {
      await fetch(`${base}/approve/${id}`, { method: 'PUT' });
      loadStudents();
    }

    async function deleteStudent(id) {
      await fetch(`${base}/students/${id}`, { method: 'DELETE' });
      loadStudents();
    }

    // --------- STAFF CRUD ---------
    async function loadStaff() {
      const res = await fetch(`${base}/staff`);
      const staff = await res.json();
      document.getElementById('staffTable').innerHTML = staff.map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${s.email}</td>
          <td>
            <button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteStaff('${s._id}')">Delete</button>
          </td>
        </tr>`).join('');
    }

    document.getElementById('addStaffForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const staff = {
        name: document.getElementById('stname').value,
        email: document.getElementById('stemail').value,
        password: document.getElementById('stpass').value,
        department: document.getElementById('stdept').value
      };
      await fetch(`${base}/staff`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(staff) });
      loadStaff();
      e.target.reset();
    });

    async function deleteStaff(id) {
      await fetch(`${base}/staff/${id}`, { method: 'DELETE' });
      loadStaff();
    }

    // --------- JOBS CRUD ---------
    async function loadJobs() {
      const res = await fetch(`${base}/jobs`);
      const jobs = await res.json();
      document.getElementById('jobsTable').innerHTML = jobs.map(j => `
        <tr>
          <td>${j.title}</td>
          <td>${j.company}</td>
          <td>${j.description}</td>
          <td>
            <button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteJob('${j._id}')">Delete</button>
          </td>
        </tr>`).join('');
    }

    document.getElementById('addJobForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const job = {
        title: document.getElementById('jtitle').value,
        company: document.getElementById('jcompany').value,
        description: document.getElementById('jdesc').value
      };
      await fetch(`${base}/jobs`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(job) });
      loadJobs();
      e.target.reset();
    });

    async function deleteJob(id) {
      await fetch(`${base}/jobs/${id}`, { method: 'DELETE' });
      loadJobs();
    }

    // --------- TRAININGS CRUD ---------
    async function loadTrainings() {
      const res = await fetch(`${base}/trainings`);
      const trainings = await res.json();
      document.getElementById('trainingTable').innerHTML = trainings.map(t => `
        <tr>
          <td>${t.title}</td>
          <td>${t.speaker}</td>
          <td>${new Date(t.date).toLocaleDateString()}</td>
          <td>
            <button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteTraining('${t._id}')">Delete</button>
          </td>
        </tr>`).join('');
    }

    document.getElementById('addTrainingForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const training = {
        title: document.getElementById('ttitle').value,
        speaker: document.getElementById('ttrainer').value,
        date: document.getElementById('tdate').value
      };
      await fetch(`${base}/trainings`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(training) });
      loadTrainings();
      e.target.reset();
    });

    async function deleteTraining(id) {
      await fetch(`${base}/trainings/${id}`, { method: 'DELETE' });
      loadTrainings();
    }

    // --------- ANNOUNCEMENTS CRUD ---------
    async function loadAnnouncements() {
      const res = await fetch(`${base}/announcements`);
      const anns = await res.json();
      document.getElementById('annTable').innerHTML = anns.map(a => `
        <tr>
          <td>${a.title}</td>
          <td>${a.message}</td>
          <td>${new Date(a.date).toLocaleDateString()}</td>
          <td>
            <button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteAnn('${a._id}')">Delete</button>
          </td>
        </tr>`).join('');
    }

    document.getElementById('addAnnForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const ann = {
        title: document.getElementById('atitle').value,
        message: document.getElementById('amsg').value,
        date: new Date()
      };
      await fetch(`${base}/announcements`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(ann) });
      loadAnnouncements();
      e.target.reset();
    });

    async function deleteAnn(id) {
      await fetch(`${base}/announcements/${id}`, { method: 'DELETE' });
      loadAnnouncements();
    }

    // Initial load
    loadStudents(); loadStaff(); loadJobs(); loadTrainings(); loadAnnouncements();
  </script>
</body>
</html>
