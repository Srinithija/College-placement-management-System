<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Staff Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .section { display: none; }
    .active { display: block; }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex">

  <!-- Sidebar -->
  <aside class="w-64 bg-blue-700 text-white flex flex-col">
    <div class="p-6 text-center border-b border-blue-500">
      <h2 class="text-2xl font-semibold">Staff Panel</h2>
    </div>
    <nav class="flex-1 p-4 space-y-2">
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('profile')">👤 Profile</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('students')">🎓 Students</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('jobs')">💼 Jobs</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('trainings')">📚 Trainings</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('announcements')">📢 Announcements</button>
      <button class="w-full text-left py-2 px-3 rounded hover:bg-blue-600" onclick="showSection('applications')">📝 Applications</button>
    </nav>
    <div class="p-4 border-t border-blue-600">
      <button onclick="logout()" class="w-full bg-red-500 py-2 rounded hover:bg-red-600">🚪 Logout</button>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-8 overflow-auto">
    <h1 class="text-3xl font-semibold text-blue-700 mb-6">Staff Dashboard</h1>

    <!-- Profile -->
    <section id="profile" class="section active">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Profile</h2>
      <div class="bg-white shadow rounded-lg p-4">
        <form id="profileForm" class="flex flex-wrap gap-4">
          <input id="pname" placeholder="Name" class="border p-2 rounded w-60" required>
          <input id="pemail" placeholder="Email" class="border p-2 rounded w-60" required>
          <input id="ppass" placeholder="New Password (leave blank to keep)" type="password" class="border p-2 rounded w-60">
          <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Update Profile</button>
        </form>
      </div>
    </section>

    <!-- Students -->
    <section id="students" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Students</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white"><tr><th>Name</th><th>Email</th><th>Department</th></tr></thead>
          <tbody id="studentTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Add Student</h3>
        <form id="addStudentForm" class="flex flex-wrap gap-4">
          <input id="sname" placeholder="Name" class="border p-2 rounded w-60" required>
          <input id="semail" placeholder="Email" class="border p-2 rounded w-60" required>
          <input id="spass" placeholder="Password" type="password" class="border p-2 rounded w-60" required>
          <input id="sdept" placeholder="Department" class="border p-2 rounded w-60">
          <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Student</button>
        </form>
      </div>
    </section>

    <!-- Jobs -->
    <section id="jobs" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Jobs</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white"><tr><th>Title</th><th>Company</th><th>Description</th><th>Action</th></tr></thead>
          <tbody id="jobsTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Add Job</h3>
        <form id="addJobForm" class="flex flex-wrap gap-4">
          <input id="jtitle" placeholder="Title" class="border p-2 rounded w-60" required>
          <input id="jcompany" placeholder="Company" class="border p-2 rounded w-60" required>
          <textarea id="jdesc" placeholder="Description" class="border p-2 rounded w-full h-20"></textarea>
          <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Job</button>
        </form>
      </div>
    </section>

    <!-- Trainings -->
    <section id="trainings" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Trainings</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white"><tr><th>Title</th><th>Trainer</th><th>Date</th><th>Action</th></tr></thead>
          <tbody id="trainingTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Add Training</h3>
        <form id="addTrainingForm" class="flex flex-wrap gap-4">
          <input id="ttitle" placeholder="Title" class="border p-2 rounded w-60" required>
          <input id="ttrainer" placeholder="Trainer" class="border p-2 rounded w-60" required>
          <input id="tdate" type="date" class="border p-2 rounded w-60" required>
          <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Add Training</button>
        </form>
      </div>
    </section>

    <!-- Announcements -->
    <section id="announcements" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Announcements</h2>
      <div class="bg-white shadow rounded-lg p-4 mb-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white"><tr><th>Title</th><th>Message</th><th>Date</th><th>Action</th></tr></thead>
          <tbody id="annTable" class="text-gray-700"></tbody>
        </table>
      </div>
      <div class="bg-white shadow rounded-lg p-4">
        <h3 class="text-lg font-medium mb-3">Post Announcement</h3>
        <form id="addAnnForm" class="flex flex-wrap gap-4">
          <input id="atitle" placeholder="Title" class="border p-2 rounded w-60" required>
          <textarea id="amsg" placeholder="Message" class="border p-2 rounded w-full h-20"></textarea>
          <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Post</button>
        </form>
      </div>
    </section>

    <!-- Applications -->
    <section id="applications" class="section">
      <h2 class="text-xl font-semibold text-gray-700 mb-3">Applications</h2>
      <div class="bg-white shadow rounded-lg p-4">
        <table class="w-full border-collapse">
          <thead class="bg-blue-700 text-white"><tr><th>Student</th><th>Job</th><th>Company</th><th>Status</th></tr></thead>
          <tbody id="appTable" class="text-gray-700"></tbody>
        </table>
      </div>
    </section>

  </main>

  <script>
    const token = sessionStorage.getItem('token');
    const base = 'http://localhost:5000/api/staff';

    if(!token) { alert('Staff not logged in'); window.location.href='login.html'; }

    function showSection(id){
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    function logout() {
      sessionStorage.removeItem('token');
      window.location.href = 'login.html';
    }
    // -------------------- PROFILE --------------------
  async function loadProfile() {
    const res = await fetch(`${base}/me`, { headers: { 'Authorization': `Bearer ${token}` } });
    const staff = await res.json();
    document.getElementById('pname').value = staff.name;
    document.getElementById('pemail').value = staff.email;
  }

  document.getElementById('profileForm').addEventListener('submit', async e => {
    e.preventDefault();
    const body = {
      name: document.getElementById('pname').value,
      email: document.getElementById('pemail').value
    };
    const newPass = document.getElementById('ppass').value;
    if(newPass) body.password = newPass;

    const res = await fetch(`${base}/me`, {
      method: 'PUT',
      headers: { 'Content-Type':'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(body)
    });
    alert((await res.json()).message);
  });

    // -------------------- FETCH DATA --------------------
    async function loadStudents() {
      const res = await fetch(`${base}/students`, { headers:{ 'Authorization': `Bearer ${token}` }});
      const students = await res.json();
      document.getElementById('studentTable').innerHTML = students.map(s => 
        `<tr><td>${s.name}</td><td>${s.email}</td><td>${s.department || '-'}</td></tr>`).join('');
    }

    async function loadJobs() {
      const res = await fetch(`${base}/jobs`, { headers:{ 'Authorization': `Bearer ${token}` }});
      const jobs = await res.json();
      document.getElementById('jobsTable').innerHTML = jobs.map(j => 
        `<tr>
          <td>${j.title}</td><td>${j.company}</td><td>${j.description}</td>
          <td><button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteJob('${j._id}')">Delete</button></td>
        </tr>`).join('');
    }

    async function loadTrainings() {
      const res = await fetch(`${base}/trainings`, { headers:{ 'Authorization': `Bearer ${token}` }});
      const data = await res.json();
      document.getElementById('trainingTable').innerHTML = data.map(t => 
        `<tr>
          <td>${t.title}</td><td>${t.speaker}</td><td>${new Date(t.date).toLocaleDateString()}</td>
          <td><button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteTraining('${t._id}')">Delete</button></td>
        </tr>`).join('');
    }

    async function loadAnnouncements() {
      const res = await fetch(`${base}/announcements`, { headers:{ 'Authorization': `Bearer ${token}` }});
      const data = await res.json();
      document.getElementById('annTable').innerHTML = data.map(a => 
        `<tr>
          <td>${a.title}</td><td>${a.message}</td><td>${new Date(a.date).toLocaleDateString()}</td>
          <td><button class="bg-red-500 text-white px-2 py-1 rounded" onclick="deleteAnn('${a._id}')">Delete</button></td>
        </tr>`).join('');
    }

    async function loadApplications() {
      const res = await fetch(`${base}/applications`, { headers:{ 'Authorization': `Bearer ${token}` }});
      const data = await res.json();
      document.getElementById('appTable').innerHTML = data.map(a => 
        `<tr><td>${a.studentId?.name}</td><td>${a.jobId?.title}</td><td>${a.jobId?.company}</td><td>${a.status}</td></tr>`).join('');
    }

    // -------------------- POST DATA --------------------
    document.getElementById('addStudentForm').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await fetch(`${base}/students`, {
        method:'POST', headers:{ 'Content-Type':'application/json','Authorization': `Bearer ${token}` },
        body: JSON.stringify({
          name: document.getElementById('sname').value,
          email: document.getElementById('semail').value,
          password: document.getElementById('spass').value,
          department: document.getElementById('sdept').value
        })
      });
      alert((await res.json()).message);
      loadStudents();
      e.target.reset();
    });

    document.getElementById('addJobForm').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await fetch(`${base}/jobs`, {
        method:'POST', headers:{ 'Content-Type':'application/json','Authorization': `Bearer ${token}` },
        body: JSON.stringify({
          title: document.getElementById('jtitle').value,
          company: document.getElementById('jcompany').value,
          description: document.getElementById('jdesc').value
        })
      });
      alert((await res.json()).message);
      loadJobs();
      e.target.reset();
    });

    document.getElementById('addTrainingForm').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await fetch(`${base}/trainings`, {
        method:'POST', headers:{ 'Content-Type':'application/json','Authorization': `Bearer ${token}` },
        body: JSON.stringify({
          title: document.getElementById('ttitle').value,
          speaker: document.getElementById('ttrainer').value,
          date: document.getElementById('tdate').value
        })
      });
      alert((await res.json()).message);
      loadTrainings();
      e.target.reset();
    });

    document.getElementById('addAnnForm').addEventListener('submit', async e => {
      e.preventDefault();
      const res = await fetch(`${base}/announcements`, {
        method:'POST', headers:{ 'Content-Type':'application/json','Authorization': `Bearer ${token}` },
        body: JSON.stringify({
          title: document.getElementById('atitle').value,
          message: document.getElementById('amsg').value
        })
      });
      alert((await res.json()).message);
      loadAnnouncements();
      e.target.reset();
    });

    // -------------------- DELETE DATA --------------------
    async function deleteJob(id){
      if(!confirm('Delete this job?')) return;
      const res = await fetch(`${base}/jobs/${id}`, { method:'DELETE', headers:{ 'Authorization': `Bearer ${token}` } });
      alert((await res.json()).message);
      loadJobs();
    }

    async function deleteTraining(id){
      if(!confirm('Delete this training?')) return;
      const res = await fetch(`${base}/trainings/${id}`, { method:'DELETE', headers:{ 'Authorization': `Bearer ${token}` } });
      alert((await res.json()).message);
      loadTrainings();
    }

    async function deleteAnn(id){
      if(!confirm('Delete this announcement?')) return;
      const res = await fetch(`${base}/announcements/${id}`, { method:'DELETE', headers:{ 'Authorization': `Bearer ${token}` } });
      alert((await res.json()).message);
      loadAnnouncements();
    }

    // -------------------- INITIAL LOAD --------------------
    loadProfile();
    loadStudents(); loadJobs(); loadTrainings(); loadAnnouncements(); loadApplications();
  </script>

</body>
</html>
